<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OuterTiers - Rankings</title>
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/logo.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

    <!-- ===== SEO / OPEN GRAPH (Discord, Twitter, iMessage, etc.) ===== -->
    <meta name="description" content="View Minecraft's best PvP players or compete in the OuterTiers ranked community!" />
    <link rel="canonical" href="https://outertiers.onrender.com/" />

    <!-- Open Graph — controls Discord/Slack/Facebook embeds -->
    <meta property="og:type"        content="website" />
    <meta property="og:site_name"   content="OuterTiers" />
    <meta property="og:url"         content="https://outertiers.onrender.com/" />
    <meta property="og:title"       content="OuterTiers — Minecraft PvP Rankings" />
    <meta property="og:description" content="The competitive Minecraft PvP ranking platform. Every tier. Every category. Every player." />
    <meta property="og:image"        content="https://outertiers.onrender.com/og-image.png" />
    <meta property="og:image:secure_url" content="https://outertiers.onrender.com/og-image.png" />
    <meta property="og:image:type"   content="image/png" />
    <meta property="og:image:width"  content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt"    content="OuterTiers — Minecraft PvP Rankings" />

    <!-- Twitter / X card (large image preview) -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:title"       content="OuterTiers — Minecraft PvP Rankings" />
    <meta name="twitter:description" content="The competitive Minecraft PvP ranking platform. Every tier. Every category. Every player." />
    <meta name="twitter:image"       content="https://outertiers.onrender.com/og-image.png" />
    <meta name="twitter:image:alt"   content="OuterTiers — Minecraft PvP Rankings" />

    <!-- Discord embed accent color -->
    <meta name="theme-color" content="#2563eb" />

    <!-- ===== SECURITY HEADERS ===== -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta http-equiv="X-Frame-Options" content="SAMEORIGIN" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <meta http-equiv="Permissions-Policy" content="camera=(), microphone=(), geolocation=(), payment=()" />
    <meta http-equiv="Content-Security-Policy" content="
      default-src 'self';
      script-src 'self' 'unsafe-inline';
      style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
      font-src 'self' https://fonts.gstatic.com;
      img-src 'self' data: https: blob:;
      connect-src 'self' https://api.github.com https://playerdb.co https://outertiers-api.onrender.com;
      frame-ancestors 'self';
      base-uri 'self';
      form-action 'self';
    " />

    <!-- ===== FONTS ===== -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
