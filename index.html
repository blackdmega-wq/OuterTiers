<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OuterTiers - Rankings</title>

    <!-- ===== SEO / OPEN GRAPH (Discord, Twitter, iMessage, etc.) ===== -->
    <meta name="description" content="View Minecraft's best PvP players or compete in the OuterTiers ranked community!" />

    <!-- Open Graph — controls Discord/Slack/Facebook embeds -->
    <meta property="og:type"        content="website" />
    <meta property="og:title"       content="OuterTiers - Rankings" />
    <meta property="og:description" content="View Minecraft's best PvP players or compete in the OuterTiers ranked community!" />
    <meta property="og:image"       content="https://outertiers.onrender.com/icons/pvpclub.webp" />

    <!-- Twitter / X card -->
    <meta name="twitter:card"        content="summary" />
    <meta name="twitter:title"       content="OuterTiers - Rankings" />
    <meta name="twitter:description" content="View Minecraft's best PvP players or compete in the OuterTiers ranked community!" />

    <!-- Discord embed accent color -->
    <meta name="theme-color" content="#2563eb" />

    <!-- ===== SECURITY HEADERS ===== -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta http-equiv="X-Frame-Options" content="SAMEORIGIN" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <meta http-equiv="Permissions-Policy" content="camera=(), microphone=(), geolocation=(), payment=()" />
    <meta http-equiv="Content-Security-Policy" content="
      default-src 'self';
      script-src 'self' 'unsafe-inline';
      style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
      font-src 'self' https://fonts.gstatic.com;
      img-src 'self' data: https: blob:;
      connect-src 'self' https://api.github.com https://playerdb.co https://outertiers-api.onrender.com;
      frame-ancestors 'self';
      base-uri 'self';
      form-action 'self';
    " />

    <!-- ===== FONTS ===== -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
