<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>OuterTiers</title>
  <script>
    // GitHub Pages SPA fallback
    // Encode the path into the query string so index.html can decode it
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') + '/' +
      l.pathname.slice(1).split('/').slice(0, 1).join('/') +
      '/?/' + l.pathname.slice(1) + (l.search ? '&' + l.search.slice(1) : '') + l.hash
    );
  </script>
</head>
<body></body>
</html>
